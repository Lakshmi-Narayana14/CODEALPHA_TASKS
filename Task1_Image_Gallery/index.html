<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <img src="./image1.jpg" class="nature" onclick="openLightbox(this)">
        <img src="./image2.jpg" class="nature" onclick="openLightbox(this)">

        <img src="./image3.jpg" class="nature" onclick="openLightbox(this)">
        <img src="./image4.jpg" class="city" onclick="openLightbox(this)">

        <img src="./image5.jpg" class="city" onclick="openLightbox(this)">
        <img src="./image6.jpg" class="animals" onclick="openLightbox(this)">
        <img src="./image7.jpg" class="animals" onclick="openLightbox(this)">
        <img src="./image8.jpg" class="animals" onclick="openLightbox(this)">
       

       

    </div>

    <!-- Lightbox -->
    <div id="lightbox">

        <span class="close" onclick="closeLightbox()">&times;</span>

        <button class="prev" onclick="changeImage(-1)">❮</button>

        <img id="lightboxImage">

        <button class="next" onclick="changeImage(1)">❯</button>

    </div>

    <script src="script.js"></script>
    <footer><p>Designed by Dangeti Sri Lakshmi Narayana | CodeAlpha Internship 2026</p></footer>

</body>
</html>
